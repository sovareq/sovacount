[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = []

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    # webpki-roots / webpki-root-certs ship the Mozilla trust store
    # under the Community Data License Agreement (Permissive 2.0).
    # OSI-permissive equivalent — safe for inclusion.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.92

[[licenses.exceptions]]
allow = ["OpenSSL"]
crate = "ring"

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
