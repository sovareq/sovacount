[graph]
all-features = true

[advisories]
version = 2
yanked = "deny"
ignore = [
    # gtk-rs GTK3-bindings via wry/tao chain. SovaCount-launcher draait
    # alleen op macOS (WKWebView/AppKit pad); GTK3-pad wordt enkel op
    # Linux gecompileerd. Geen runtime-footprint op onze productie-targets.
    # Volg upstream-migratie naar gtk4-rs zodra wry/tao dat ondersteunen.
    "RUSTSEC-2024-0411",
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0414",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # proc-macro-error unmaintained (RUSTSEC-2024-0370), via wry compile-time.
    # Compile-only afhankelijkheid, geen runtime-impact.
    "RUSTSEC-2024-0370",
    # fxhash unmaintained (RUSTSEC-2025-0057), via wry-deps. Hashing-only,
    # geen security-impact. Volg upstream-migratie.
    "RUSTSEC-2025-0057",
]

[licenses]
version = 2
# Workspace-crates dragen `license = "MIT"` met `publish = false` — we publishen
# niet naar crates.io maar de source is openbaar onder MIT (zie LICENSE).
# `private.ignore` blijft true zodat cargo-deny onze eigen crates niet tegen
# de allow-list checkt (MIT zit er sowieso in, maar dit is robuuster voor
# toekomstige edge-cases zoals split-licensing per crate).
private = { ignore = true }
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "CC0-1.0",
    "MPL-2.0",
    # webpki-roots / webpki-root-certs ship the Mozilla trust store
    # under the Community Data License Agreement (Permissive 2.0).
    # OSI-permissive equivalent — safe for inclusion.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.92

[[licenses.exceptions]]
allow = ["OpenSSL"]
crate = "ring"

[bans]
multiple-versions = "warn"
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
