name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build binaries (release)
        run: |
          cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            REF="${{ github.event.inputs.tag }}"
          fi
          NAME="token-governor-${REF}-${{ matrix.target }}"
          STAGE="$(mktemp -d)/$NAME"
          mkdir -p "$STAGE"
          cp target/${{ matrix.target }}/release/tier-classify "$STAGE/"
          cp target/${{ matrix.target }}/release/governor-http "$STAGE/"
          cp target/${{ matrix.target }}/release/governor-mcp "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/"
          tar -C "$(dirname "$STAGE")" -czf "$NAME.tar.gz" "$NAME"
          shasum -a 256 "$NAME.tar.gz" > "$NAME.tar.gz.sha256"
          echo "archive=$NAME.tar.gz" >> "$GITHUB_OUTPUT"
          echo "checksum=$NAME.tar.gz.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
