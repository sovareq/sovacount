name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            archive: tar.gz
            exe_suffix: ""
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            exe_suffix: ""
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
            exe_suffix: ".exe"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}

      - name: Build binaries (release)
        run: |
          cargo build --release --workspace --target ${{ matrix.target }}

      - name: Package archive
        id: package
        shell: bash
        run: |
          REF="${{ github.ref_name }}"
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            REF="${{ github.event.inputs.tag }}"
          fi
          NAME="token-governor-${REF}-${{ matrix.target }}"
          STAGE="$(mktemp -d)/$NAME"
          EXT="${{ matrix.exe_suffix }}"
          mkdir -p "$STAGE"
          cp "target/${{ matrix.target }}/release/tier-classify${EXT}" "$STAGE/"
          cp "target/${{ matrix.target }}/release/governor-http${EXT}" "$STAGE/"
          cp "target/${{ matrix.target }}/release/governor-mcp${EXT}" "$STAGE/"
          cp README.md LICENSE CHANGELOG.md "$STAGE/"
          if [ "${{ matrix.archive }}" = "zip" ]; then
            ARCHIVE="$NAME.zip"
            (cd "$(dirname "$STAGE")" && 7z a "$OLDPWD/$ARCHIVE" "$NAME")
          else
            ARCHIVE="$NAME.tar.gz"
            tar -C "$(dirname "$STAGE")" -czf "$ARCHIVE" "$NAME"
          fi
          # SHA-256 — sha256sum on Linux/Windows-runners (git-bash), shasum on macOS.
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "$ARCHIVE" > "$ARCHIVE.sha256"
          else
            shasum -a 256 "$ARCHIVE" > "$ARCHIVE.sha256"
          fi
          echo "archive=$ARCHIVE" >> "$GITHUB_OUTPUT"
          echo "checksum=$ARCHIVE.sha256" >> "$GITHUB_OUTPUT"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ steps.package.outputs.archive }}
            ${{ steps.package.outputs.checksum }}

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || github.event.inputs.tag }}
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.tar.gz.sha256
            artifacts/**/*.zip
            artifacts/**/*.zip.sha256
