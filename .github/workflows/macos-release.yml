name: macos-release

# Triggered on git tag (v*) push. Builds, signs, notarizes, and uploads the
# SovaCount.app bundle to the corresponding GitHub Release.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   APPLE_DEVELOPER_ID_CERT_P12      Base64-encoded .p12 file (developer-id cert + private key)
#   APPLE_DEVELOPER_ID_CERT_PASSWORD Password for the .p12 file
#   APPLE_NOTARY_API_KEY_P8          Base64-encoded App Store Connect API key (.p8)
#   APPLE_NOTARY_API_KEY_ID          App Store Connect API key ID (10 chars)
#   APPLE_NOTARY_API_ISSUER_ID       App Store Connect issuer UUID
#   SOVACOUNT_SIGNING_IDENTITY       Full identity string, e.g.:
#                                    "Developer ID Application: Bjorn Lambrechts (XXXXXXXXXX)"
#
# If any of the APPLE_* secrets are missing, the workflow falls back to ad-hoc
# signing and uploads an unsigned-but-functional bundle (useful for early
# pilots before the Apple Developer enrollment is approved).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      sign_mode:
        description: "Signing mode (adhoc | developer-id | notarize)"
        required: true
        default: "notarize"

permissions:
  contents: write  # required for softprops/action-gh-release

jobs:
  build:
    runs-on: macos-14
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry + target
        uses: Swatinem/rust-cache@v2

      - name: Decide sign mode
        id: sign
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            MODE="${{ github.event.inputs.sign_mode }}"
          elif [[ -n "${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}" && -n "${{ secrets.APPLE_NOTARY_API_KEY_P8 }}" ]]; then
            MODE="notarize"
          elif [[ -n "${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}" ]]; then
            MODE="developer-id"
          else
            MODE="adhoc"
          fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "[ci] using sign mode: $MODE"

      - name: Import Apple Developer ID certificate
        if: steps.sign.outputs.mode != 'adhoc'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.APPLE_DEVELOPER_ID_CERT_P12 }}
          p12-password: ${{ secrets.APPLE_DEVELOPER_ID_CERT_PASSWORD }}

      - name: Store notarytool credentials
        if: steps.sign.outputs.mode == 'notarize'
        shell: bash
        env:
          API_KEY_P8: ${{ secrets.APPLE_NOTARY_API_KEY_P8 }}
          API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
          API_ISSUER: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_P8" | base64 --decode > "$KEY_PATH"
          xcrun notarytool store-credentials sovacount-notary \
            --key      "$KEY_PATH" \
            --key-id   "$API_KEY_ID" \
            --issuer   "$API_ISSUER"

      - name: Package SovaCount.app
        env:
          SIGN_MODE: ${{ steps.sign.outputs.mode }}
          SIGNING_IDENTITY: ${{ secrets.SOVACOUNT_SIGNING_IDENTITY }}
          NOTARY_PROFILE: sovacount-notary
        run: |
          ./scripts/package-macos.sh

      - name: Verify codesign
        shell: bash
        run: |
          codesign --verify --strict --verbose=4 dist/SovaCount.app || true
          spctl --assess --type execute --verbose dist/SovaCount.app || true

      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: SovaCount-macos-${{ github.ref_name }}-${{ steps.sign.outputs.mode }}
          path: dist/SovaCount.zip
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/SovaCount.zip
          fail_on_unmatched_files: true
          generate_release_notes: true
